name: Daily KPI Report

on:
  schedule:
    - cron: '0 5 * * *'   # 5:00 AM UTC every day — covers full previous calendar day
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  send-kpi-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for Workload Identity (no-op for JSON key auth)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery slack-sdk pyarrow

      - name: Send daily KPI report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/daily_kpi_report.py
